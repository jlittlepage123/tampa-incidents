<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tampa Police Incidents Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="app-container">
    <!-- Sidebar with filters -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Tampa Incidents</h1>
        <div class="stats" id="stats">Loading...</div>
      </div>

      <div class="filters">
        <h2>Filters</h2>

        <!-- Date Range -->
        <div class="filter-group">
          <label>Date Range</label>
          <div class="quick-dates">
            <button class="quick-date" data-days="1">24h</button>
            <button class="quick-date active" data-days="7">7 days</button>
            <button class="quick-date" data-days="30">30 days</button>
            <button class="quick-date" data-days="90">90 days</button>
          </div>
          <div class="date-inputs">
            <input type="date" id="startDate" />
            <span>to</span>
            <input type="date" id="endDate" />
          </div>
        </div>

        <!-- Description Filter -->
        <div class="filter-group">
          <label>Incident Type</label>
          <div class="description-filter">
            <input type="text" id="descriptionSearch" placeholder="Search types..." />
            <div class="select-all-buttons">
              <button type="button" id="selectAllDescriptions" class="select-btn">Select All</button>
              <button type="button" id="deselectAllDescriptions" class="select-btn">Deselect All</button>
            </div>
            <div class="description-list" id="descriptionList">
              Loading...
            </div>
          </div>
        </div>

        <button class="apply-filters" id="applyFilters">Apply Filters</button>
        <button class="clear-filters" id="clearFilters">Clear All</button>
      </div>

      <!-- Legend -->
      <div class="legend">
        <h3>Pin Colors</h3>
        <div class="legend-item">
          <span class="legend-pin red"></span>
          <span>Grid 152 (Priority)</span>
        </div>
        <div class="legend-item">
          <span class="legend-pin yellow"></span>
          <span>Neighborhood Grids</span>
        </div>
        <div class="legend-item">
          <span class="legend-pin blue"></span>
          <span>Other Areas</span>
        </div>
      </div>
    </aside>

    <!-- Main content area -->
    <main class="main-content">
      <!-- Map container -->
      <div id="map"></div>

      <!-- Details panel (hidden by default) -->
      <div class="details-panel" id="detailsPanel">
        <button class="close-panel" id="closePanel">&times;</button>
        <h2>Incident Details</h2>
        <div class="details-content" id="detailsContent">
          Select an incident on the map
        </div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="/js/map.js"></script>
</body>
</html>
