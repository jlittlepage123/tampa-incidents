services:
  tampa-incidents:
    image: tampa-incidents:latest
    container_name: tampa-incidents-map
    ports:
      - "3001:3000"
    volumes:
      - tampa-incidents-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/incidents.db
      - FETCH_INTERVAL_MINUTES=60
      # Zone configuration (comma-separated grid numbers) — uncomment to override defaults
      # - GRID_RED=152
      # - GRID_YELLOW=120,136,151,153,157,158,159
      # Map center — uncomment to override (defaults to Tampa Police Grid 152 centroid)
      # - MAP_CENTER_LAT=27.947281
      # - MAP_CENTER_LNG=-82.499440
      # - MAP_CENTER_ZOOM=14
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  tampa-incidents-data:
